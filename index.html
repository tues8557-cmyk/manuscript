<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>400자 원고지 에디터 v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&display=swap" rel="stylesheet">
    <style>
        :root {
            --grid-color: #ff6b6b; /* 기본 빨강 */
            --cell-size: 9mm;
        }

        body { margin: 0; padding: 0; background: #525659; font-family: 'Nanum Myeongjo', serif; }

        /* 툴바 */
        #toolbar {
            position: fixed; top: 0; width: 100%; height: 50px;
            background: #fff; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 1000; box-sizing: border-box;
        }

        .btn { cursor: pointer; padding: 6px 12px; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-size: 13px; }

        /* 페이지 레이아웃 */
        #app { margin-top: 60px; display: flex; flex-direction: column; align-items: center; gap: 40px; padding-bottom: 50px; }

        .page {
            width: 210mm; height: 297mm;
            background: #fff; box-shadow: 0 0 15px rgba(0,0,0,0.3);
            padding: 20mm; box-sizing: border-box;
            display: flex; flex-direction: column;
            page-break-after: always; position: relative;
        }

        /* PDF 디자인 요소: 상단 NO. 및 페이지 번호 */
        .page-header {
            display: flex; justify-content: flex-end; align-items: center;
            font-size: 18px; margin-bottom: 10mm; font-weight: bold; color: var(--grid-color);
        }
        .no-text { margin-right: 5px; }
        .page-num { border-bottom: 1px solid var(--grid-color); min-width: 30px; text-align: center; }

        /* 격자 영역 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(20, var(--cell-size));
            grid-template-rows: repeat(20, var(--cell-size));
            border: 1px solid var(--grid-color);
            align-self: center;
        }

        .cell {
            width: var(--cell-size); height: var(--cell-size);
            border: 0.5px solid var(--grid-color);
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; outline: none; box-sizing: border-box; background: #fff;
        }
        .cell:focus { background-color: #fff9db; }

        /* 색상 선택 메뉴 */
        .color-picker { display: flex; gap: 10px; align-items: center; font-size: 13px; }
        .color-dot { width: 15px; height: 15px; border-radius: 50%; cursor: pointer; border: 1px solid #ddd; }

        @media print {
            body { background: none; }
            #toolbar { display: none; }
            #app { margin: 0; padding: 0; gap: 0; }
            .page { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<header id="toolbar">
    <button class="btn" onclick="newDocument()">📄 새 원고지</button>
    
    <div class="color-picker">
        색상:
        <div class="color-dot" style="background: #ff6b6b;" onclick="changeColor('#ff6b6b')"></div>
        <div class="color-dot" style="background: #444;" onclick="changeColor('#444')"></div>
        <div class="color-dot" style="background: #000;" onclick="changeColor('#000')"></div>
    </div>

    <div class="btn" onclick="window.print()">공유 / 인쇄 / PDF</div>
</header>

<div id="app"></div>

<script>
    const app = document.getElementById('app');
    const COLS = 20, ROWS = 20;
    const CELLS_PER_PAGE = COLS * ROWS;
    let cellCounter = 0;
    let pageCount = 0;

    function createPage() {
        pageCount++;
        const page = document.createElement('div');
        page.className = 'page';
        
        // PDF 디자인 반영 (NO. 페이지번호)
        page.innerHTML = `
            <div class="page-header">
                <span class="no-text">NO.</span>
                <span class="page-num">${pageCount}</span>
            </div>
        `;

        const grid = document.createElement('div');
        grid.className = 'grid-container';

        for (let i = 0; i < CELLS_PER_PAGE; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.contentEditable = "true";
            cell.dataset.index = cellCounter++;

            // 한글 입력 이슈 해결을 위한 이벤트 리스너
            cell.addEventListener('compositionend', (e) => {
                // 조합이 완료된 시점에만 다음 칸 이동
                moveFocus(parseInt(e.target.dataset.index) + 1);
                autoSave();
            });

            cell.addEventListener('keydown', handleKeyDown);
            grid.appendChild(cell);
        }
        page.appendChild(grid);
        app.appendChild(page);
    }

    function moveFocus(index) {
        if (index >= cellCounter) createPage();
        const next = document.querySelector(`.cell[data-index="${index}"]`);
        if (next) {
            next.focus();
            next.scrollIntoView({ behavior: "smooth", block: "center" });
        }
    }

    function handleKeyDown(e) {
        const cell = e.target;
        const index = parseInt(cell.dataset.index);

        // 엔터: 다음 줄 첫 칸으로
        if (e.key === 'Enter') {
            e.preventDefault();
            const nextLineIndex = (Math.floor(index / COLS) + 1) * COLS;
            moveFocus(nextLineIndex);
        }

        // 백스페이스: 이전 칸으로 이동하며 지우기
        if (e.key === 'Backspace' && cell.innerText === '' && index > 0) {
            e.preventDefault();
            const prev = document.querySelector(`.cell[data-index="${index - 1}"]`);
            if (prev) {
                prev.innerText = '';
                prev.focus();
            }
        }
    }

    function changeColor(color) {
        document.documentElement.style.setProperty('--grid-color', color);
    }

    function autoSave() {
        const cells = document.querySelectorAll('.cell');
        const content = Array.from(cells).map(c => c.innerText || " ").join("").replace(/\s+$/, "");
        window.location.hash = encodeURIComponent(btoa(encodeURIComponent(content)));
    }

    function loadData() {
        if (window.location.hash) {
            try {
                const decoded = decodeURIComponent(atob(decodeURIComponent(window.location.hash.substring(1))));
                const pagesNeeded = Math.ceil(decoded.length / CELLS_PER_PAGE) || 1;
                for(let i=1; i < pagesNeeded; i++) createPage();

                const cells = document.querySelectorAll('.cell');
                decoded.split("").forEach((char, i) => {
                    if (cells[i]) cells[i].innerText = char === " " ? "" : char;
                });
            } catch (e) {}
        }
    }

    function newDocument() {
        if (confirm("새 원고지를 만드시겠습니까? 모든 내용이 사라집니다.")) {
            window.location.hash = "";
            location.reload();
        }
    }

    createPage();
    loadData();
</script>

</body>
</html>
